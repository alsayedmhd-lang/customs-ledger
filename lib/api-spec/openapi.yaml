openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Customs Clearance Accounting API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: invoices
    description: Invoice management
  - name: invoice-items
    description: Invoice item templates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/statement:
    get:
      operationId: getClientStatement
      tags: [clients]
      summary: Get account statement for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatement"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: clientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceWithItems"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoice-item-templates:
    get:
      operationId: listInvoiceItemTemplates
      tags: [invoice-items]
      summary: List saved invoice item templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceItemTemplate"
    post:
      operationId: createInvoiceItemTemplate
      tags: [invoice-items]
      summary: Create an invoice item template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceItemTemplateRequest"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceItemTemplate"

  /invoice-item-templates/{id}:
    put:
      operationId: updateInvoiceItemTemplate
      tags: [invoice-items]
      summary: Update an invoice item template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceItemTemplateRequest"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceItemTemplate"
    delete:
      operationId: deleteInvoiceItemTemplate
      tags: [invoice-items]
      summary: Delete an invoice item template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        taxId:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateClientRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        taxId:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - name

    InvoiceItem:
      type: object
      properties:
        id:
          type: integer
        invoiceId:
          type: integer
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        total:
          type: number
      required:
        - id
        - invoiceId
        - description
        - quantity
        - unitPrice
        - total

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        clientId:
          type: integer
        clientName:
          type: string
        issueDate:
          type: string
        dueDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, issued, paid, cancelled]
        subtotal:
          type: number
        taxRate:
          type: number
        taxAmount:
          type: number
        total:
          type: number
        notes:
          type: string
          nullable: true
        shipmentRef:
          type: string
          nullable: true
        portOfEntry:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - invoiceNumber
        - clientId
        - clientName
        - issueDate
        - status
        - subtotal
        - taxRate
        - taxAmount
        - total
        - createdAt
        - updatedAt

    InvoiceWithItems:
      allOf:
        - $ref: "#/components/schemas/Invoice"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/InvoiceItem"
          required:
            - items

    CreateInvoiceItemRequest:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
      required:
        - description
        - quantity
        - unitPrice

    CreateInvoiceRequest:
      type: object
      properties:
        clientId:
          type: integer
        issueDate:
          type: string
        dueDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, issued, paid, cancelled]
        taxRate:
          type: number
        notes:
          type: string
          nullable: true
        shipmentRef:
          type: string
          nullable: true
        portOfEntry:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateInvoiceItemRequest"
      required:
        - clientId
        - issueDate
        - status
        - taxRate
        - items

    AccountStatement:
      type: object
      properties:
        client:
          $ref: "#/components/schemas/Client"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceWithItems"
        totalDue:
          type: number
        totalPaid:
          type: number
        balance:
          type: number
      required:
        - client
        - invoices
        - totalDue
        - totalPaid
        - balance

    InvoiceItemTemplate:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        defaultUnitPrice:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - description
        - defaultUnitPrice
        - createdAt

    CreateInvoiceItemTemplateRequest:
      type: object
      properties:
        description:
          type: string
        defaultUnitPrice:
          type: number
      required:
        - description
        - defaultUnitPrice
